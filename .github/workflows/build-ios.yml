name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 16 — MacOSX.sdk lookup works (actool/ibtool work via xcrun)
          # Xcode 26 has broken xcodebuild -sdk <absolute-path> -find tool lookup
          XCODE=$(ls /Applications/ | grep "^Xcode_16" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          echo "Selected: $XCODE"
          DEVELOPER_DIR="/Applications/$XCODE/Contents/Developer"
          sudo xcode-select -s "$DEVELOPER_DIR"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> $GITHUB_ENV
          echo "$DEVELOPER_DIR/usr/bin" >> $GITHUB_PATH
          xcodebuild -version
          echo "XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')" >> $GITHUB_ENV
          echo "actool: $(xcrun --find actool 2>&1)"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload update && dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Patch iOS SDK Xcode version requirement
        run: python3 scripts/patch_xcode.py

      - name: Build unsigned app
        run: |
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:PublishTrimmed=true \
            -p:MtouchLink=SdkOnly \
            -p:ValidateXcodeVersion=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false

      - name: Package IPA
        run: |
          APP=$(find . -name "*.app" -path "*/ios-arm64/*" | grep -v simulator | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r DailyFantasyIOS.ipa Payload/
          echo "IPA created: $(ls -lh DailyFantasyIOS.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: DailyFantasyIOS.ipa
