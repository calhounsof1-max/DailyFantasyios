name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 26 — required for iOS 26 SDK (MAUI iOS 26.5 needs it)
          XCODE=$(ls /Applications/ | grep "^Xcode_26" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          echo "Selected: $XCODE"
          DEVELOPER_DIR="/Applications/$XCODE/Contents/Developer"
          sudo xcode-select -s "$DEVELOPER_DIR"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> $GITHUB_ENV
          echo "$DEVELOPER_DIR/usr/bin" >> $GITHUB_PATH
          xcodebuild -version
          echo "XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')" >> $GITHUB_ENV

      - name: Diagnose SDK and tools
        run: |
          SDK_DIR="$DEVELOPER_DIR/Platforms/MacOSX.platform/Developer/SDKs"
          echo "=== macOS SDKs ==="
          ls -la "$SDK_DIR"
          echo ""
          for SDK in "$SDK_DIR"/MacOSX*.sdk; do
            PLIST="$SDK/SDKSettings.plist"
            if [ -f "$PLIST" ]; then
              NAME=$(plutil -extract CanonicalName raw "$PLIST" 2>/dev/null)
              echo "$SDK -> CanonicalName: $NAME"
            fi
          done
          echo ""
          echo "=== Tool lookup tests ==="
          echo "xcrun --find actool: $(xcrun --find actool 2>&1)"
          echo "xcrun --find ibtool: $(xcrun --find ibtool 2>&1)"
          echo "xcrun -sdk macosx --find actool: $(xcrun -sdk macosx --find actool 2>&1)"
          echo "xcrun -sdk iphoneos --find actool: $(xcrun -sdk iphoneos --find actool 2>&1)"
          echo ""
          echo "=== xcodebuild showsdks ==="
          xcodebuild -showsdks 2>&1 | head -30
          echo ""
          echo "=== actool in usr/bin ==="
          ls "$DEVELOPER_DIR/usr/bin/" | grep -E "actool|ibtool" || echo "none found"
          echo ""
          echo "=== xcodebuild -sdk <absolute-path> -find actool test ==="
          SDK=$(ls "$SDK_DIR"/MacOSX*.sdk | head -1)
          echo "Testing with: $SDK"
          xcodebuild -sdk "$SDK" -find actool 2>&1 || true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload update && dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Patch iOS SDK Xcode version requirement
        run: python3 scripts/patch_xcode.py

      - name: Build unsigned app
        run: |
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:PublishTrimmed=true \
            -p:ValidateXcodeVersion=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false

      - name: Package IPA
        run: |
          APP=$(find . -name "*.app" -path "*/ios-arm64/*" | grep -v simulator | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r DailyFantasyIOS.ipa Payload/
          echo "IPA created: $(ls -lh DailyFantasyIOS.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: DailyFantasyIOS.ipa
