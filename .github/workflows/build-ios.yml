name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 26 for iOS 26 SDK — we fix the actool lookup via xcrun wrapper
          XCODE=$(ls /Applications/ | grep "^Xcode_26" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          echo "Selected: $XCODE"
          DEVELOPER_DIR="/Applications/$XCODE/Contents/Developer"
          sudo xcode-select -s "$DEVELOPER_DIR"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> $GITHUB_ENV
          echo "$DEVELOPER_DIR/usr/bin" >> $GITHUB_PATH
          xcodebuild -version
          echo "XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')" >> $GITHUB_ENV

          # Wrap xcrun to fix MAUI's broken absolute-path MacOSX SDK lookup (Xcode 26.3 bug).
          # xcodebuild 26.3 exits 64 (EX_USAGE) for: xcodebuild -sdk /abs/path -find <tool>
          # Strategy:
          #   • For tool lookup with MacOSX SDK (absolute or canonical "macosx"):
          #     - If tool is actool/clang/clang++/ld/etc: use xcrun --find <tool> (no -sdk)
          #       This goes through the XcodeDefault toolchain, not broken xcodebuild path
          #   • For other -sdk args: pass through unchanged
          mkdir -p /tmp/xcrun-wrapper
          cat > /tmp/xcrun-wrapper/xcrun << 'XCRUNEOF'
          #!/bin/bash
          ARGS=()
          PREV=""
          HAS_MACOS_SDK=false
          FIND_TOOL=""
          for arg in "$@"; do
            if [[ "$PREV" == "-sdk" && "$arg" == */MacOSX*.sdk* ]]; then
              ARGS+=("macosx")
              HAS_MACOS_SDK=true
            elif [[ "$PREV" == "-sdk" && "$arg" == "macosx"* ]]; then
              ARGS+=("$arg")
              HAS_MACOS_SDK=true
            else
              ARGS+=("$arg")
            fi
            if [[ "$PREV" == "-find" || "$PREV" == "--find" ]]; then
              FIND_TOOL="$arg"
            fi
            PREV="$arg"
          done
          # xcodebuild 26.3 fails: xcodebuild -sdk /abs/path -find <tool>
          # Even xcrun --find <tool> may use xcodebuild internally and fail.
          # Solution: look up the tool directly in XcodeDefault toolchain.
          if [[ "$HAS_MACOS_SDK" == "true" && -n "$FIND_TOOL" ]]; then
            DEV="${DEVELOPER_DIR:-$(xcode-select -p 2>/dev/null)}"
            TOOLBIN="$DEV/Toolchains/XcodeDefault.xctoolchain/usr/bin"
            if [[ -f "$TOOLBIN/$FIND_TOOL" ]]; then
              echo "$TOOLBIN/$FIND_TOOL"
              exit 0
            fi
            # Also check usr/bin in the developer dir
            DEVBIN="$DEV/usr/bin"
            if [[ -f "$DEVBIN/$FIND_TOOL" ]]; then
              echo "$DEVBIN/$FIND_TOOL"
              exit 0
            fi
          fi
          exec /usr/bin/xcrun "${ARGS[@]}"
          XCRUNEOF
          chmod +x /tmp/xcrun-wrapper/xcrun
          echo "/tmp/xcrun-wrapper" >> $GITHUB_PATH
          echo "xcrun wrapper installed"
          echo "actool: $(/tmp/xcrun-wrapper/xcrun --find actool 2>&1)"
          echo "clang via wrapper (macos-sdk): $(/tmp/xcrun-wrapper/xcrun -sdk macosx -find clang 2>&1)"
          echo "clang++ via wrapper (macos-sdk): $(/tmp/xcrun-wrapper/xcrun -sdk macosx -find clang++ 2>&1)"

          # The MAUI SDK check looks for a directory named iPhoneOS26.5.sdk.
          # xcrun --sdk iphoneos returns iPhoneOS26.2.sdk (only installed SDK).
          # Solution: symlink iPhoneOS26.5.sdk → iPhoneOS26.2.sdk so the check passes.
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          echo "iPhoneOS SDK path: $IOS_SDK"
          if [ -n "$IOS_SDK" ]; then
            SDK_PARENT=$(dirname "$IOS_SDK")
            sudo ln -sfn "$IOS_SDK" "$SDK_PARENT/iPhoneOS26.5.sdk"
            echo "Created symlink: $SDK_PARENT/iPhoneOS26.5.sdk -> $IOS_SDK"
            ls -la "$SDK_PARENT/" | grep iPhoneOS
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload update && dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Patch iOS SDK Xcode version requirement
        run: python3 scripts/patch_xcode.py

      - name: Build unsigned app
        run: |
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:PublishTrimmed=true \
            -p:MtouchLink=SdkOnly \
            -p:ValidateXcodeVersion=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false \
            -p:_SdkVersion=26.5

      - name: Package IPA
        run: |
          APP=$(find . -name "*.app" -path "*/ios-arm64/*" | grep -v simulator | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r DailyFantasyIOS.ipa Payload/
          echo "IPA created: $(ls -lh DailyFantasyIOS.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: DailyFantasyIOS.ipa
