name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest Xcode 26.x for iOS 26 SDK support
          XCODE=$(ls /Applications/ | grep "^Xcode_26" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          echo "Selected: $XCODE"
          DEVELOPER_DIR="/Applications/$XCODE/Contents/Developer"
          sudo xcode-select -s "$DEVELOPER_DIR"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> $GITHUB_ENV

          # Show available macOS SDKs
          SDK_DIR="$DEVELOPER_DIR/Platforms/MacOSX.platform/Developer/SDKs"
          echo "macOS SDKs: $(ls $SDK_DIR 2>/dev/null)"

          # Show where actool is
          ACTOOL=$(find "$DEVELOPER_DIR" -name "actool" -type f 2>/dev/null | head -1)
          echo "actool found at: $ACTOOL"
          if [ -n "$ACTOOL" ]; then
            echo "$(dirname $ACTOOL)" >> $GITHUB_PATH
          fi

          # Show available iOS SDKs
          IOS_SDK_DIR="$DEVELOPER_DIR/Platforms/iPhoneOS.platform/Developer/SDKs"
          echo "iOS SDKs: $(ls $IOS_SDK_DIR 2>/dev/null)"

          xcodebuild -version
          xcrun -find actool 2>/dev/null || echo "actool not found via xcrun"
          echo "XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')" >> $GITHUB_ENV

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload update && dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Patch iOS SDK Xcode version requirement
        run: python3 scripts/patch_xcode.py

      - name: Build unsigned app
        run: |
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:PublishTrimmed=true \
            -p:ValidateXcodeVersion=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false

      - name: Package IPA
        run: |
          APP=$(find . -name "*.app" -path "*/ios-arm64/*" | grep -v simulator | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r DailyFantasyIOS.ipa Payload/
          echo "IPA created: $(ls -lh DailyFantasyIOS.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: DailyFantasyIOS.ipa
