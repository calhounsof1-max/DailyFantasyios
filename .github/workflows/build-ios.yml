name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Build unsigned IPA
        run: |
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false

      - name: Find IPA
        run: find . -name "*.ipa" | head -20

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: |
            **/*.ipa
          if-no-files-found: warn
