name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest Xcode 26.x for iOS 26 SDK support
          XCODE=$(ls /Applications/ | grep "^Xcode_26" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          echo "Selected: $XCODE"
          DEVELOPER_DIR="/Applications/$XCODE/Contents/Developer"
          sudo xcode-select -s "$DEVELOPER_DIR"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> $GITHUB_ENV

          # Fix macOS SDK CanonicalName so xcodebuild -sdk <path> -find <tool> works
          SDK_DIR="$DEVELOPER_DIR/Platforms/MacOSX.platform/Developer/SDKs"
          echo "macOS SDKs before fix: $(ls $SDK_DIR 2>/dev/null)"
          VERSIONED_SDK=$(ls "$SDK_DIR" | grep "^MacOSX[0-9]" | sort -V | tail -1)
          echo "Versioned SDK: $VERSIONED_SDK"
          if [ -n "$VERSIONED_SDK" ]; then
            PLIST="$SDK_DIR/$VERSIONED_SDK/SDKSettings.plist"
            echo "Current CanonicalName: $(plutil -extract CanonicalName raw "$PLIST" 2>/dev/null)"
            sudo plutil -replace CanonicalName -string "macosx" "$PLIST"
            echo "Fixed CanonicalName: $(plutil -extract CanonicalName raw "$PLIST" 2>/dev/null)"
            sudo rm -f "$SDK_DIR/MacOSX.sdk"
            sudo ln -sf "$SDK_DIR/$VERSIONED_SDK" "$SDK_DIR/MacOSX.sdk"
            echo "Symlinked MacOSX.sdk -> $VERSIONED_SDK"
          fi

          xcodebuild -version
          xcrun -find actool 2>/dev/null && echo "actool: OK" || echo "actool not found"
          echo "XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')" >> $GITHUB_ENV

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload update && dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Patch iOS SDK Xcode version requirement
        run: python3 scripts/patch_xcode.py

      - name: Build unsigned app
        run: |
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:PublishTrimmed=true \
            -p:ValidateXcodeVersion=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false

      - name: Package IPA
        run: |
          APP=$(find . -name "*.app" -path "*/ios-arm64/*" | grep -v simulator | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r DailyFantasyIOS.ipa Payload/
          echo "IPA created: $(ls -lh DailyFantasyIOS.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: DailyFantasyIOS.ipa
