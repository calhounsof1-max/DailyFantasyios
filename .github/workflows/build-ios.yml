name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          XCODE=$(ls /Applications/ | grep "^Xcode_26" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          echo "Using: $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version
          echo "XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')" >> $GITHUB_ENV

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload update && dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Patch iOS SDK Xcode version requirement
        run: |
          python3 - <<'EOF'
import glob, os, re

home = os.path.expanduser('~')
pattern = f'{home}/.dotnet/packs/Microsoft.iOS.Sdk*/*/targets/Xamarin.Shared.Sdk.targets'
files = glob.glob(pattern)
print(f'Found targets files: {files}')
for f in files:
    with open(f) as fh:
        content = fh.read()
    lines = content.split('\n')
    for i, line in enumerate(lines):
        if 'xcode' in line.lower() and ('require' in line.lower() or 'version' in line.lower()):
            print(f'Line {i+1}: {line.strip()}')
    # Remove or neutralize any Xcode version Error condition
    patched = re.sub(
        r'<Error\s[^/]*requires\s+Xcode[^/]*/?>',
        '<!-- xcode check removed -->',
        content, flags=re.IGNORECASE|re.DOTALL
    )
    if patched != content:
        with open(f, 'w') as fh:
            fh.write(patched)
        print(f'Patched: {f}')
    else:
        print(f'No match found in: {f}')
EOF

      - name: Build unsigned app
        run: |
          XCODE_VER=$(xcodebuild -version | head -1 | awk '{print $2}')
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:PublishTrimmed=true \
            -p:XcodeVersion=$XCODE_VER \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false

      - name: Package IPA
        run: |
          APP=$(find . -name "*.app" -path "*/ios-arm64/*" | grep -v simulator | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r DailyFantasyIOS.ipa Payload/
          echo "IPA created: $(ls -lh DailyFantasyIOS.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: DailyFantasyIOS.ipa
