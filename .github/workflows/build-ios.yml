name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use Xcode 26 for iOS 26 SDK — we fix the actool lookup via xcrun wrapper
          XCODE=$(ls /Applications/ | grep "^Xcode_26" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          fi
          echo "Selected: $XCODE"
          DEVELOPER_DIR="/Applications/$XCODE/Contents/Developer"
          sudo xcode-select -s "$DEVELOPER_DIR"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> $GITHUB_ENV
          echo "$DEVELOPER_DIR/usr/bin" >> $GITHUB_PATH
          xcodebuild -version
          echo "XCODE_VERSION=$(xcodebuild -version | head -1 | awk '{print $2}')" >> $GITHUB_ENV

          # Wrap xcrun to fix MAUI's broken absolute-path SDK lookup
          # MAUI calls: xcrun -sdk /path/MacOSX.sdk -find actool  (FAILS in Xcode 26)
          # We convert to: xcrun -sdk macosx -find actool          (WORKS)
          mkdir -p /tmp/xcrun-wrapper
          cat > /tmp/xcrun-wrapper/xcrun << 'XCRUNEOF'
          #!/bin/bash
          ARGS=()
          PREV=""
          for arg in "$@"; do
            if [[ "$PREV" == "-sdk" && "$arg" == */MacOSX*.sdk* ]]; then
              ARGS+=("macosx")
            else
              ARGS+=("$arg")
            fi
            PREV="$arg"
          done
          exec /usr/bin/xcrun "${ARGS[@]}"
          XCRUNEOF
          chmod +x /tmp/xcrun-wrapper/xcrun
          echo "/tmp/xcrun-wrapper" >> $GITHUB_PATH
          echo "xcrun wrapper installed"
          echo "actool: $(/tmp/xcrun-wrapper/xcrun --find actool 2>&1)"

          # Patch iOS SDK plist so xcrun reports 26.5 (belt-and-suspenders; main fix is in patch_xcode.py)
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          echo "iPhoneOS SDK path: $IOS_SDK"
          echo "iPhoneOS SDK version (before patch): $(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null)"
          if [ -n "$IOS_SDK" ]; then
            PLIST="$IOS_SDK/SDKSettings.plist"
            echo "Plist before patch:"; plutil -p "$PLIST" | grep -E 'Version|CanonicalName|MaximumDeployment' || true
            sudo plutil -replace MaximumDeploymentTarget -string "26.5" "$PLIST"
            # Version key: use replace first; if it fails (key missing), insert it
            sudo plutil -replace Version -string "26.5" "$PLIST" 2>/dev/null \
              || sudo plutil -insert Version -string "26.5" "$PLIST" 2>/dev/null || true
            # CanonicalName: xcrun may use this to report --show-sdk-version
            sudo plutil -replace CanonicalName -string "iphoneos26.5" "$PLIST" 2>/dev/null \
              || sudo plutil -insert CanonicalName -string "iphoneos26.5" "$PLIST" 2>/dev/null || true
            echo "Plist after patch:"; plutil -p "$PLIST" | grep -E 'Version|CanonicalName|MaximumDeployment' || true
            echo "iPhoneOS SDK version (after patch): $(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null)"
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload update && dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore DailyFantasyIOS.csproj

      - name: Patch iOS SDK Xcode version requirement
        run: python3 scripts/patch_xcode.py

      - name: Show where _SdkVersion is set
        run: |
          # Search props/targets files in ALL iOS-related packs for _SdkVersion
          for f in $(find ~/.dotnet/packs/Microsoft.iOS.Sdk.net10.0_26.5 -name "*.props" -o -name "*.targets" 2>/dev/null); do
            if grep -q '_SdkVersion' "$f" 2>/dev/null; then
              echo "=== $f ==="; grep -n '_SdkVersion' "$f"
            fi
          done

      - name: Build unsigned app
        run: |
          dotnet publish DailyFantasyIOS.csproj \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:PublishTrimmed=true \
            -p:MtouchLink=SdkOnly \
            -p:ValidateXcodeVersion=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:CodesignRequireProvisioningProfile=false \
            -p:_SdkVersion=26.5

      - name: Package IPA
        run: |
          APP=$(find . -name "*.app" -path "*/ios-arm64/*" | grep -v simulator | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r DailyFantasyIOS.ipa Payload/
          echo "IPA created: $(ls -lh DailyFantasyIOS.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyFantasyIOS-unsigned
          path: DailyFantasyIOS.ipa
